<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Lightning bolt / Zap icon -->
  <path d="M18.5 3.5 L9 17.5 H15.5 L13.5 28.5 L23 14.5 H16.5 Z"
        fill="url(#bolt)"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="0.5"
        stroke-linejoin="round"/>
</svg>
